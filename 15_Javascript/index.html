<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>🎬 CineVoid — Movie Database</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600&display=swap"
      rel="stylesheet"
    />

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="container">
      <!-- Header -->
      <div class="site-header">
        <h1>CineVoid</h1>
        <p class="tagline">Explore the universe of cinema</p>
      </div>

      <!-- Search -->
      <div class="row justify-content-center mb-2">
        <div class="col-md-8">
          <div class="search-wrapper input-group mb-3">
            <input
              type="text"
              class="form-control input-keyword"
              placeholder="Search a movie title..."
            />
            <button class="search-button" type="button">Search</button>
          </div>
        </div>
      </div>

      <div class="section-divider"></div>

      <!-- Movie Cards -->
      <div class="row movie-container">
        <div class="state-message">
          <span class="icon">🛸</span>
          Enter a movie title to begin your journey
        </div>
      </div>
    </div>

    <!-- ─── Modal ─────────────────────────────────── -->
    <div
      class="modal fade"
      id="DetailMovie"
      tabindex="-1"
      aria-labelledby="DetailMovieLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content">
          <div class="modal-header">
            <h1 class="modal-title" id="DetailMovieLabel">Movie Detail</h1>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="modal-body">
            <div class="container-fluid">
              <div class="row">
                <div class="col-md-3 mb-3 mb-md-0">
                  <img src="" alt="" class="img-fluid" />
                </div>
                <div class="col-md">
                  <ul class="list-group">
                    <li class="list-group-item"><h4>Title | Year</h4></li>
                    <li class="list-group-item">
                      <strong>Director:</strong> —
                    </li>
                    <li class="list-group-item"><strong>Actors:</strong> —</li>
                    <li class="list-group-item"><strong>Writer:</strong> —</li>
                    <li class="list-group-item"><strong>Plot:</strong> —</li>
                  </ul>
                </div>
              </div>
            </div>
          </div>
          <div class="modal-footer">
            <button
              type="button"
              class="btn-close-modal"
              data-bs-dismiss="modal"
            >
              Close
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Scripts -->
    <script
      src="https://code.jquery.com/jquery-4.0.0.min.js"
      integrity="sha256-OaVG6prZf4v69dPg6PhVattBXkcOWQB62pdZ3ORyrao="
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="Error_Handling.js"></script>
  </body>
</html>
